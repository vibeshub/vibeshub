<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1411" />

    <!-- Set <html data-theme> and the browser-chrome theme-color before first
         paint to avoid a flash of the wrong theme. Mirrors the initial-theme
         logic in src/useTheme.ts. Must run before the stylesheets below apply
         and before the app bundle. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("vibeshub.theme");
          if (t !== "light" && t !== "dark")
            t = matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "light" ? "#f4f8f6" : "#0f1411");
        } catch (e) {}
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/globals.css" />
    <link rel="stylesheet" href="/src/styles/pages.css" />
    <link rel="stylesheet" href="/src/styles/vibeviewer.css" />

    <!-- Default metadata. Each route may override <title>, <meta name="description">,
         <link rel="canonical">, and any og:/twitter: tags via SeoHead. React 19
         hoists those tags into <head> at render time.

         The SEO_HEAD_START/END markers are also a contract with the backend SPA
         catch-all (app/api/spa_seo.py): for known trace URLs the server swaps
         the block between these markers for trace-specific tags so social
         scrapers (which don't run JS) see real link previews. Do not remove
         or rename the markers without updating spa_seo.py. -->
    <!--SEO_HEAD_START-->
    <title>vibeshub · share Claude Code sessions as replayable traces</title>
    <meta
      name="description"
      content="Vibeshub captures any Claude Code session and turns it into a shareable, replayable trace. Public &amp; private viewer with GitHub-mirrored access and automatic secret redaction."
    />
    <link rel="canonical" href="https://vibeshub.ai/" />

    <meta property="og:site_name" content="vibeshub" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="vibeshub · share Claude Code sessions as replayable traces" />
    <meta
      property="og:description"
      content="Don't just ship the diff — share the vibe. Capture and replay any Claude Code session."
    />
    <meta property="og:url" content="https://vibeshub.ai/" />
    <meta property="og:image" content="https://vibeshub.ai/og-default.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="vibeshub · share Claude Code sessions as replayable traces" />
    <meta
      name="twitter:description"
      content="Don't just ship the diff — share the vibe. Capture and replay any Claude Code session."
    />
    <meta name="twitter:image" content="https://vibeshub.ai/og-default.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "vibeshub",
        "url": "https://vibeshub.ai",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "macOS, Linux, Windows",
        "description": "Turn your Claude Code and Codex sessions, including every subagent they spawn, into shareable, replayable traces, each with an AI digest of the session. Public and private viewer with GitHub-mirrored access and automatic secret redaction.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!--SEO_HEAD_END-->

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0Z3X95Z064"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0Z3X95Z064');

      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wvwmy3c4l2");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
